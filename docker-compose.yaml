services:
  ollama:
    volumes:
      - ollama:/root/.ollama
    container_name: ollama
    pull_policy: always
    tty: true
    restart: unless-stopped
    image: ollama/ollama:${OLLAMA_DOCKER_TAG-latest}
    deploy:
      resources:
        limits:
          cpus: '4'    # Increased from 2 to 4 CPUs
          memory: 8G   # Increased from 4G to 8G RAM
        reservations:
          cpus: '2'    # Increased from 1 to 2 CPUs
          memory: 4G   # Increased from 2G to 4G RAM

  open-webui:
    build:
      context: .
      args:
        OLLAMA_BASE_URL: '/ollama'
      dockerfile: Dockerfile
    image: ghcr.io/open-webui/open-webui:${WEBUI_DOCKER_TAG-main}
    container_name: open-webui
    volumes:
      - open-webui:/app/backend/data
    depends_on:
      - ollama
    ports:
      - ${OPEN_WEBUI_PORT-3000}:8080
    environment:
      - 'OLLAMA_BASE_URL=http://ollama:11434'
      - 'WEBUI_SECRET_KEY='
    extra_hosts:
      - host.docker.internal:host-gateway
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2'    # Increased from 1 to 2 CPUs
          memory: 4G   # Increased from 2G to 4G RAM
        reservations:
          cpus: '1'    # Increased from 0.5 to 1 CPU
          memory: 2G   # Increased from 1G to 2G RAM

volumes:
  ollama: {}
  open-webui: {}